services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mealmap
      POSTGRES_USER: mealmap
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealmap"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/mealmap
      DB_USERNAME: mealmap
      DB_PASSWORD: ${DB_PASSWORD}
      SPOONACULAR_API_KEY: ${SPOONACULAR_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
