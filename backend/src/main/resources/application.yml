spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mealmap}
    username: ${DB_USERNAME:mealmap}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

spoonacular:
  api:
    key: ${SPOONACULAR_API_KEY}
    base-url: https://api.spoonacular.com

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

server:
  port: 8080
